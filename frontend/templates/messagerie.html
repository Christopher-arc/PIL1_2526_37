{% extends "base.html" %}

{% block content %}
<div class="msg-layout">
  <div class="msg-gauche">
    <div class="msg-titre">Messages</div>
    <div class="p-2 border-bottom">
      <input type="text" class="form-control form-control-sm" placeholder="Chercher un utilisateur...">
    </div>
    <div class="msg-vide">
      <div class="fs-1 mb-2 opacity-25">✉️</div>
      <div>Aucune conversation.</div>
      <div class="small">Trouvez un match et contactez-le !</div>
    </div>
    <button class="btn btn-light border w-90 mx-2 my-2 py-1 small">+ Nouvelle conversation</button>
  </div>
  <div class="msg-droite">
    <div class="fs-1 mb-2 opacity-25">✉️</div>
    <p class="fw-semibold text-dark mb-0">Sélectionnez une conversation</p>
    <small class="text-secondary">ou trouvez un match pour commencer</small>
  </div>
</div>
{% endblock %}
