<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFRI MentorLink - Messagerie</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif
    }

    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh
    }

    /* Navbar */
    .navbar {
      background: #0a1e3d;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .15)
    }

    .navbar h1 {
      font-size: 20px;
      flex: 1;
      font-weight: 600
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 14px
    }
    .logo-box {
      width: 42px;
      height: 42px;
      background: #00a86b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }
    .logo-box span {
      color: #fff;
      font-size: 22px;
      font-weight: 700
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2
    }
    .logo-ifri {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px
    }
    .logo-mentor {
      color: #00a86b;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .5px
    }

    .notif-btn {
      background: rgba(255, 255, 255, .12);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .2s
    }

    .notif-wrapper {
      position: relative
    }

    .notif-btn:hover {
      background: rgba(255, 255, 255, .22)
    }

    .notif-badge {
      background: #ff5252;
      color: #fff;
      border-radius: 50%;
      padding: 1px 7px;
      font-size: 12px;
      font-weight: 700;
      position: absolute;
      top: -6px;
      right: -6px;
      display: none;
      border: 2px solid #0a1e3d
    }

    .notif-dropdown {
      position: absolute;
      top: 50px;
      right: 24px;
      background: #fff;
      color: #333;
      width: 340px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .2);
      display: none;
      z-index: 100;
      max-height: 400px;
      overflow-y: auto
    }

    .notif-dropdown.show {
      display: block
    }

    .notif-item {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      cursor: pointer
    }

    .notif-item:last-child {
      border: none
    }

    .notif-item:hover {
      background: #f5f7fa
    }

    .notif-type {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px
    }

    .notif-header {
      padding: 14px 16px;
      font-weight: 600;
      border-bottom: 1px solid #eee;
      font-size: 14px
    }

    .notif-empty {
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 13px
    }

    .notif-date {
      font-size: 11px;
      color: #999;
      margin-top: 4px
    }

    .notif-type.message {
      background: #e3f2fd;
      color: #1565c0
    }

    .notif-type.match {
      background: #e8f5e9;
      color: #2e7d32
    }

    .notif-type.réponse {
      background: #fff3e0;
      color: #e65100
    }

    /* Layout */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* Sidebar */
    .sidebar {
      width: 360px;
      min-width: 360px;
      background: #0a1e3d;
      display: flex;
      flex-direction: column
    }

    .sidebar-header {
      padding: 20px 20px 14px
    }

    .sidebar-header h2 {
      font-size: 17px;
      color: #fff;
      font-weight: 600
    }

    .search-bar {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      margin-top: 12px;
      outline: none;
      background: rgba(255, 255, 255, .15);
      color: #fff;
      transition: background .2s
    }

    .search-bar::placeholder {
      color: rgba(255, 255, 255, .5)
    }

    .search-bar:focus {
      background: rgba(255, 255, 255, .25)
    }

    .conv-list {
      flex: 1;
      overflow-y: auto
    }

    .conv-list::-webkit-scrollbar {
      width: 4px
    }

    .conv-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .2);
      border-radius: 2px
    }

    .conv-item {
      padding: 14px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background .15s;
      border-bottom: 1px solid rgba(255, 255, 255, .06)
    }

    .conv-item:hover {
      background: rgba(255, 255, 255, .08)
    }

    .conv-item.active {
      background: rgba(255, 255, 255, .14)
    }

    .conv-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2d4a7a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0
    }

    .conv-info {
      flex: 1;
      min-width: 0
    }

    .conv-name {
      font-weight: 600;
      font-size: 14px;
      color: #fff
    }

    .conv-preview {
      font-size: 13px;
      color: rgba(255, 255, 255, .5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px
    }

    .conv-meta {
      text-align: right;
      flex-shrink: 0
    }

    .conv-time {
      font-size: 11px;
      color: rgba(255, 255, 255, .4)
    }

    .conv-unread {
      background: #4a7bc4;
      color: #fff;
      border-radius: 50%;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
      display: inline-block;
      min-width: 20px;
      text-align: center
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff
    }

    .chat-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 15px;
      gap: 16px
    }

    .chat-placeholder svg {
      opacity: .4
    }

    .chat-placeholder span {
      color: #ccc;
      font-size: 14px
    }

    .chat-header {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: none;
      align-items: center;
      gap: 12px
    }

    .chat-header .conv-avatar {
      width: 38px;
      height: 38px;
      font-size: 14px;
      background: #2d4a7a
    }

    .chat-header .conv-name {
      font-size: 15px;
      color: #333;
      font-weight: 600
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: none;
      flex-direction: column;
      background: #fafafa
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 3px
    }

    .message {
      max-width: 70%;
      margin-bottom: 14px;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word
    }

    .message.sent {
      background: #0a1e3d;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px
    }

    .message.received {
      background: #e8edf5;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px
    }

    .message .msg-time {
      font-size: 10px;
      opacity: .6;
      margin-top: 4px;
      text-align: right;
      color: inherit
    }

    .message.received .msg-sender {
      font-size: 11px;
      font-weight: 600;
      color: #2d4a7a;
      margin-bottom: 2px
    }

    .chat-input-area {
      display: none;
      padding: 14px 24px;
      background: #fff;
      border-top: 1px solid #e8e8e8;
      gap: 10px;
      align-items: center
    }

    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s
    }

    .chat-input-area input:focus {
      border-color: #0a1e3d
    }

    .chat-input-area button {
      background: #0a1e3d;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s
    }

    .chat-input-area button:hover {
      background: #162d52
    }

    .chat-input-area button:disabled {
      background: #ccc;
      cursor: not-allowed
    }

    .loading {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 13px
    }

    .back-btn {
      display: none;
      background: none;
      border: none;
      font-size: 22px;
      color: #333;
      cursor: pointer;
      padding: 0 4px 0 0;
      line-height: 1
    }

    @media (max-width: 767px) {
      .sidebar {
        width: 100%;
        min-width: 0;
        display: flex
      }
      .sidebar.hide-mobile {
        display: none
      }
      .chat-area {
        width: 100%;
        display: none
      }
      .chat-area.show-mobile {
        display: flex
      }
      .chat-placeholder.show-mobile {
        display: flex
      }
      .back-btn {
        display: inline-block
      }
      .notif-dropdown {
        width: calc(100vw - 32px);
        right: 16px;
        top: 46px
      }
      .navbar {
        padding: 10px 16px
      }
      .logo-box {
        width: 34px;
        height: 34px
      }
      .logo-box span {
        font-size: 18px
      }
      .logo-ifri {
        font-size: 14px
      }
      .logo-mentor {
        font-size: 12px
      }
      .notif-btn {
        padding: 6px 12px;
        font-size: 13px
      }
      .message {
        max-width: 85%
      }
      .chat-messages {
        padding: 16px
      }
    }

    @media (min-width: 768px) and (max-width: 1024px) {
      .sidebar {
        width: 280px;
        min-width: 280px
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">
      <div class="logo-box"><span>M</span></div>
      <div class="logo-text">
        <span class="logo-ifri">IFRI</span>
        <span class="logo-mentor">Mentor Link</span>
      </div>
    </div>
    <div class="notif-wrapper">
      <button class="notif-btn" onclick="toggleNotifs()">
        Notifications <span class="notif-badge" id="notifBadge">0</span>
      </button>
      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div id="notifList"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Discussions</h2>
        <input class="search-bar" type="text" placeholder="Rechercher..." oninput="filterConversations(this.value)">
      </div>
      <div class="conv-list" id="convList"></div>
    </aside>

    <main class="chat-area">
      <div class="chat-placeholder" id="chatPlaceholder">
        <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="M22 4L12 13L2 4" />
        </svg>
        <span>Sélectionnez une conversation</span>
      </div>
      <div class="chat-header" id="chatHeader">
        <button class="back-btn" onclick="backToConversations()">←</button>
        <div class="conv-avatar" id="chatAvatar">?</div>
        <div class="conv-name" id="chatName">Interlocuteur</div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area" id="chatInputArea">
        <input type="text" id="messageInput" placeholder="Écrivez votre message..."
          onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" id="sendBtn">➤</button>
      </div>
    </main>
  </div>

  <script>
    const socket = io();
    let currentDiscussionId = null;
    let currentUserId = 1;

    socket.on('connect', () => console.log('SocketIO connecté'));

    socket.on('receive_message', (msg) => {
      if (currentDiscussionId == msg.id_discussion) {
        appendMessage(msg);
        scrollChat();
      }
      loadConversations();
      if (msg.id_utilisateur != currentUserId) {
        updateNotifCount();
      }
    });

    async function loadConversations() {
      try {
        const res = await fetch('/discussions');
        const data = await res.json();
        const list = document.getElementById('convList');
        list.innerHTML = '';
        if (data.length === 0) {
          list.innerHTML = '<div class="loading">Aucune conversation</div>';
          return;
        }
        data.forEach(c => {
          const initials = (c.prenom?.[0] || '') + (c.nom?.[0] || '');
          const div = document.createElement('div');
          div.className = 'conv-item' + (c.id_discussion === currentDiscussionId ? ' active' : '');
          div.innerHTML = `
        <div class="conv-avatar">${initials || '?'}</div>
        <div class="conv-info">
          <div class="conv-name">${c.prenom} ${c.nom}</div>
          <div class="conv-preview">${c.dernier_message || 'Aucun message'}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${c.date_creation}</div>
          ${c.non_lus > 0 ? `<div class="conv-unread">${c.non_lus}</div>` : ''}
        </div>
      `;
          div.onclick = () => openDiscussion(c.id_discussion);
          list.appendChild(div);
        });
      } catch (e) {
        console.error('Erreur chargement conversations:', e);
      }
    }

    function isMobile() {
      return window.innerWidth <= 767;
    }

    function backToConversations() {
      document.querySelector('.sidebar').classList.remove('hide-mobile');
      document.querySelector('.chat-area').classList.remove('show-mobile');
      document.getElementById('chatPlaceholder').style.display = 'flex';
      document.getElementById('chatHeader').style.display = 'none';
      document.getElementById('chatMessages').style.display = 'none';
      document.getElementById('chatInputArea').style.display = 'none';
      currentDiscussionId = null;
      loadConversations();
    }

    async function openDiscussion(id) {
      currentDiscussionId = id;
      document.getElementById('chatPlaceholder').style.display = 'none';
      document.getElementById('chatHeader').style.display = 'flex';
      document.getElementById('chatMessages').style.display = 'flex';
      document.getElementById('chatInputArea').style.display = 'flex';
      document.getElementById('chatMessages').innerHTML = '<div class="loading">Chargement...</div>';
      document.getElementById('sendBtn').disabled = true;
      if (isMobile()) {
        document.querySelector('.sidebar').classList.add('hide-mobile');
        document.querySelector('.chat-area').classList.add('show-mobile');
      }

      socket.emit('rejoindre_discussion', { id_discussion: id });

      try {
        const [convRes, msgRes] = await Promise.all([
          fetch('/discussions'),
          fetch(`/discussion/${id}`)
        ]);
        const convs = await convRes.json();
        const msgs = await msgRes.json();

        const conv = convs.find(c => c.id_discussion == id);
        if (conv) {
          const initials = (conv.prenom?.[0] || '') + (conv.nom?.[0] || '');
          document.getElementById('chatAvatar').textContent = initials || '?';
          document.getElementById('chatName').textContent = `${conv.prenom} ${conv.nom}`;
        }

        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        msgs.forEach(m => appendMessage(m));
        scrollChat();
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('messageInput').focus();

        fetch(`/discussion/${id}/read`, { method: 'POST' });
        loadConversations();
        updateNotifCount();
      } catch (e) {
        console.error('Erreur chargement discussion:', e);
      }
    }

    function appendMessage(m) {
      const container = document.getElementById('chatMessages');
      const isMine = m.id_utilisateur == currentUserId;
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'sent' : 'received'}`;
      div.innerHTML = `
    ${!isMine ? `<div class="msg-sender">${m.prenom} ${m.nom}</div>` : ''}
    ${m.contenu}
    <div class="msg-time">${m.date_envoi}</div>
  `;
      container.appendChild(div);
    }

    function scrollChat() {
      const container = document.getElementById('chatMessages');
      setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const contenu = input.value.trim();
      if (!contenu || !currentDiscussionId) return;
      input.value = '';
      document.getElementById('sendBtn').disabled = true;
      socket.emit('send_message', { discussion_id: currentDiscussionId, contenu });
      setTimeout(() => { document.getElementById('sendBtn').disabled = false; }, 300);
    }

    function filterConversations(query) {
      const items = document.querySelectorAll('.conv-item');
      const q = query.toLowerCase();
      items.forEach(item => {
        const name = item.querySelector('.conv-name')?.textContent?.toLowerCase() || '';
        item.style.display = name.includes(q) ? 'flex' : 'none';
      });
    }

    // Notifications
    function toggleNotifs() {
      document.getElementById('notifDropdown').classList.toggle('show');
      loadNotifications();
    }

    async function loadNotifications() {
      try {
        const res = await fetch('/notifications');
        const data = await res.json();
        const list = document.getElementById('notifList');
        list.innerHTML = '';
        const notifs = data.notifications || [];
        if (notifs.length === 0) {
          list.innerHTML = '<div class="notif-empty">Aucune notification</div>';
          return;
        }
        notifs.forEach(n => {
          const div = document.createElement('div');
          div.className = 'notif-item';
          div.innerHTML = `
        <div class="notif-type ${n.type_notif}">${n.type_notif}</div>
        <div>${n.contenu}</div>
        <div class="notif-date">${n.date_creation}</div>
      `;
          list.appendChild(div);
        });
      } catch (e) {
        console.error('Erreur chargement notifications:', e);
      }
    }

    async function updateNotifCount() {
      try {
        const res = await fetch('/notifications/count');
        const data = await res.json();
        const badge = document.getElementById('notifBadge');
        if (data.count > 0) {
          badge.textContent = data.count;
          badge.style.display = 'inline';
        } else {
          badge.style.display = 'none';
        }
      } catch (e) {
        console.error('Erreur compteur notifications:', e);
      }
    }

    // Close dropdown on click outside
    document.addEventListener('click', (e) => {
      const dd = document.getElementById('notifDropdown');
      const btn = document.querySelector('.notif-btn');
      if (!btn.contains(e.target) && !dd.contains(e.target)) {
        dd.classList.remove('show');
      }
    });

    // Polling notif count every 3s (repli si SocketIO pas assez fiable)
    setInterval(updateNotifCount, 3000);

    // Init
    loadConversations();
    updateNotifCount();
  </script>
</body>

</html>
